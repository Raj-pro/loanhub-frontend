name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin Node 20 to match the frontend Dockerfile build stage.
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (lint)
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  # TODO (Phase 3): add Trivy image scan + Snyk deps scan, then build & push
  # the nginx image to ECR with a semver tag.
